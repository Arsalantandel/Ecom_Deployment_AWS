apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: ecommerce

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: 571850512186.dkr.ecr.us-east-1.amazonaws.com/ecommerce-backend:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: ecommerce-config

            - secretRef:
                name: ecommerce-secret