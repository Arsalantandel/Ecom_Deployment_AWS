apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: ecommerce

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: 571850512186.dkr.ecr.us-east-1.amazonaws.com/ecommerce-frontend:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 80

          env:
            - name: VITE_API_URL
              value: "http://backend-service:5000"