name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Backend & Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Backend
      - name: Build Backend Image
        run: docker build -t ecommerce-backend ./server

      - name: Tag Backend Image
        run: docker tag ecommerce-backend:latest 571850512186.dkr.ecr.us-east-1.amazonaws.com/ecommerce-backend:latest

      - name: Push Backend Image
        run: docker push 571850512186.dkr.ecr.us-east-1.amazonaws.com/ecommerce-backend:latest

      # Build Frontend
      - name: Build Frontend Image
        run: docker build -t ecommerce-frontend ./client

      - name: Tag Frontend Image
        run: docker tag ecommerce-frontend:latest 571850512186.dkr.ecr.us-east-1.amazonaws.com/ecommerce-frontend:latest

      - name: Push Frontend Image
        run: docker push 571850512186.dkr.ecr.us-east-1.amazonaws.com/ecommerce-frontend:latest
