services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ecommerce-backend

    ports:
      - "5000:5000"

    env_file:
      - .env

    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile

    container_name: ecommerce-frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

    restart: unless-stopped